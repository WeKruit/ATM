# Staging destination for Kamal deploys
# Hosts are injected dynamically at deploy time by kamal-runner.ts
# using EC2 fleet discovery (AWS_ASG_NAME) or fleet.json.
# Do NOT commit ephemeral IPs here — they go stale on ASG recycle.
servers:
  web:
    hosts: []
  workers:
    hosts: []

env:
  clear:
    GH_ENVIRONMENT: staging
